name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 必须赋予写权限，允许 Action 自动将修复后的 package-lock.json 推回仓库
permissions:
  contents: write

env:
  PWMCP_DEBUG: '1'
  PWDEBUGIMPL: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 获取完整历史以确保安全提交

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    # 将 npm ci 改为 npm install，从而自动补充缺失的依赖并更新锁文件
    - name: Install dependencies & Update lockfile
      run: npm install

    # 如果检测到锁文件发生变化，自动推送到当前分支，并通过 [skip ci] 避免引发死循环
    - name: Auto-commit updated lockfile
      uses: stefanzwefel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto-update package-lock.json [skip ci]"
        file_pattern: 'package-lock.json'
        commit_user_name: 'github-actions[bot]'
        commit_user_email: 'github-actions[bot]@://github.com'

    - run: npm run lint

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    # 使用 npm install 确保在多系统矩阵构建时，锁文件也是同步修复的状态
    - name: Install dependencies
      run: npm install
    - name: Playwright install
      run: npx playwright install --with-deps
    - name: Build
      run: npm run build
    - name: Run playwright-mcp tests
      id: test-mcp
      run: npm run test --workspace=packages/playwright-mcp
      continue-on-error: true
    - name: Run extension tests
      id: test-extension
      if: matrix.os == 'macos-15'
      run: npm run test --workspace=packages/extension
      continue-on-error: true
    - name: Check test results
      if: steps.test-mcp.outcome == 'failure' || steps.test-extension.outcome == 'failure'
      run: exit 1

  test_mcp_docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    # 统一换成 npm install 规避锁文件过旧导致的容器测试阻断
    - name: Install dependencies
      run: npm install
    - name: Playwright install
      run: npx playwright install --with-deps chromium
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        tags: playwright-mcp-dev:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    - name: Run tests
      shell: bash
      run: |
        # Used for the Docker tests to share the test-results folder with the container.
        umask 0000
        npm run test -- --project=chromium-docker
      working-directory: ./packages/playwright-mcp
      env:
        MCP_IN_DOCKER: 1
