name: Publish
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
  release:
    types: [published]

jobs:
  publish-mcp-canary-npm:
    if: github.event.schedule || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC npm publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npmjs.org

      # 修复 403：清理 always-auth 配置并强制使用官方源升级 npm
      - name: Update npm
        run: |
          npm config delete always-auth
          npm install -g npm@latest --registry=https://npmjs.org

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get current version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Set canary version
        id: canary-version
        run: echo "version=${{ steps.version.outputs.version }}-alpha-${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          npm version ${{ steps.canary-version.outputs.version }} --no-git-tag-version
        working-directory: ./packages/playwright-mcp

      # 修复 EUSAGE：用 npm install 替代 npm ci
      - name: Install dependencies
        run: npm install
        
      - run: npx playwright install --with-deps
      - run: npm run lint
      - run: npm run ctest
        working-directory: ./packages/playwright-mcp

      - name: Publish to npm with next tag
        run: npm publish --tag next
        working-directory: ./packages/playwright-mcp

  publish-mcp-release-npm:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC npm publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://npmjs.org

      # 修复 403：清理 always-auth 配置并强制使用官方源升级 npm
      - name: Update npm
        run: |
          npm config delete always-auth
          npm install -g npm@latest --registry=https://npmjs.org

      # 修复 EUSAGE：用 npm install 替代 npm ci
      - name: Install dependencies
        run: npm install
        
      - run: npx playwright install --with-deps
      - run: npm run lint
      - run: npm run ctest
        working-directory: ./packages/playwright-mcp
      - run: npm publish
        working-directory: ./packages/playwright-mcp

  publish-mcp-release-docker:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 核心补全：赋予向 ghcr.io 推送和写入镜像的原生权限
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 核心重构：彻底抛弃 Azure，改用 GitHub 内置凭证秒登录 ghcr.io
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 核心重构：将镜像推送到您自己的 ghcr.io 命名空间下
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:latest

  package-release-extension:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to upload release assets
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      # 修复 EUSAGE：用 npm install 替代 npm ci
      - name: Install extension dependencies
        run: npm install
        
      - name: Build extension
        working-directory: ./packages/extension
        run: npm run build
      - name: Get extension version
        id: get-version
        working-directory: ./packages/extension
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Package extension
        working-directory: ./packages/extension
        run: |
          cd dist
          zip -r ../playwright-mcp-extension-${{ steps.get-version.outputs.version }}.zip .
          cd ..
      - name: Upload extension to release
        env:
           GITHUB_TOKEN: ${{ github.token }}
        run: |
            gh release upload ${{github.event.release.tag_name}} ./packages/extension/playwright-mcp-extension-${{ steps.get-version.outputs.version }}.zip
